<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrinho - UsD Grife</title>
    <link rel="shortcut icon" href="img/imagem twitch.png" type="image/x-icon">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            height: 100vh;
            background-color: #000000e9;
            color: #ffffff;
            font-family: Arial, sans-serif;
            position: relative;
        }
        nav {
            background-color: #333;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .hamburger {
            display: flex;
            flex-direction: column;
            cursor: pointer;
        }
        .hamburger div {
            width: 25px;
            height: 3px;
            background-color: white;
            margin: 3px 0;
            transition: 0.3s;
        }
        .nav-menu {
            list-style: none;
            display: none;
            position: absolute;
            top: 100px;
            left: 0;
            width: 100%;
            background-color: #333;
            padding: 0;
            margin: 0;
        }
        .nav-menu.active {
            display: block;
        }
        .nav-menu li {
            text-align: center;
            padding: 15px 0;
        }
        .nav-menu a {
            color: #ffffff;
            text-decoration: none;
            font-size: 18px;
        }
        .nav-menu a:hover {
            text-decoration: underline;
        }
        .nav-menu .cart span {
            background-color: #7413d4;
            color: white;
            padding: 2px 6px;
            border-radius: 50%;
            font-size: 14px;
        }
         header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            height: 100px;
        }
        h1 {
            flex: 1;
            text-align: center;
            margin: 0;
            height: auto;
        }
         header img {
            width: 250px;
            height: auto;
            margin-top: 20px;
        }
        h1 {
            margin: -50px 0 0 0;
            height: auto;
            text-align: center;
        }
        hr {
            margin-top: 35px;
            border: 1px solid white;
        }
        .cart-items {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            padding: 20px;
            margin-top: 100px;
        }
        .card {
            background-color: #333;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            width: 350px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.5);
            height: 350px;
        }
        .card img {
            width: 100%;
            height: 200px;
            object-fit: contain;
            border-radius: 4px;
            position: relative;
            top: 15px;
            background-color: #fff;
        }
        .card h3 {
            margin: 20px 0 10px 0;
            font-size: 18px;
        }
        .card p {
            margin: 5px 0;
            color: #ccc;
        }
        .card button {
            background-color: #7413d4;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            margin: 5px;
        }
        .card button:hover {
            background-color: #5a0fb8;
        }
        .empty-cart {
            text-align: center;
            margin-top: 200px;
            font-size: 24px;
        }
    </style>
</head>
<body>
    <header>
    
    <div class="hamburger" onclick="toggleMenu()">
        <div></div>
        <div></div>
        <div></div>
    </div>
    </header>
    <h1>Carrinho de Compras</h1>
    <ul class="nav-menu" id="nav-menu">
        <li><a href="index.html">Inicio</a></li>
        <li><a href="pag2.html">Produtos</a></li>
        <li><a href="cart.html" class="cart">Carrinho <span id="cart-count">0</span></a></li>
    </ul>
    <hr>
    <section class="cart-items" id="cart-items">
        <!-- Itens do carrinho serão inseridos aqui via JavaScript -->
    </section>
    <footer>
        <p style="text-align: center; padding: 20px; color: #ccc;">&copy; 2026 UsD Grife. Todos os direitos reservados.</p>
        <p style="text-align: center; padding: 20px; color: #ccc;">Feito por: Julio Cesar & Nathalia Mendes</p>
    </footer>
    <script>
        function getCart() {
            return JSON.parse(localStorage.getItem('cart')) || [];
        }

        function displayCart() {
            let cart = getCart();
            let cartItemsContainer = document.getElementById('cart-items');
            if (cart.length === 0) {
                cartItemsContainer.innerHTML = '<p class="empty-cart">Carrinho vazio!</p>';
            } else {
                cartItemsContainer.innerHTML = '';
                cart.forEach((item, index) => {
                    let card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `
                        <img src="${item.img}" alt="${item.name}">
                        <h3>${item.name}</h3>
                        <p>${item.price}</p>
                        <button onclick="removeFromCart(${index})">Remover do Carrinho</button>
                    `;
                    cartItemsContainer.appendChild(card);
                });
            }
        }

        function removeFromCart(index) {
            let cart = getCart();
            cart.splice(index, 1);
            localStorage.setItem('cart', JSON.stringify(cart));
            displayCart();
        }

        function toggleMenu() {
            const navMenu = document.getElementById('nav-menu');
            navMenu.classList.toggle('active');
        }

        function updateCartCount() {
            let cart = getCart();
            document.getElementById('cart-count').textContent = cart.length;
        }

        // Load cart on page load
        displayCart();
        updateCartCount();
    </script>
</body>
</html>
